name: Trigger auto deployment for landingpagekota107

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/landingpagekota107-AutoDeployTrigger-bc085574-0159-47f2-8701-75978531db6f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.LANDINGPAGEKOTA107_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.LANDINGPAGEKOTA107_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.LANDINGPAGEKOTA107_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: kota107.azurecr.io
          registryUsername: ${{ secrets.LANDINGPAGEKOTA107_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.LANDINGPAGEKOTA107_REGISTRY_PASSWORD }}
          containerAppName: landingpagekota107
          resourceGroup: KoTA107
          imageToBuild: kota107.azurecr.io/landingpagekota107:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


